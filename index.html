<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>German A1-A2 Conversation Practice</title>
<style>
body {
  font-family: Arial, sans-serif;
  background: #f7f7f7;
  padding: 20px;
}
.container {
  max-width: 700px;
  margin: auto;
}
h1,
h2 {
  text-align: center;
}
h1 {
  margin-bottom: 8px;
}
h2 {
  margin-top: 34px;
}
p {
  text-align: center;
  color: #555555;
}
ul {
  list-style: none;
  padding: 0;
}
li {
  background: #ffffff;
  margin: 8px 0;
  padding: 12px 14px;
  border-radius: 10px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.speaker {
  font-weight: bold;
  margin-right: 6px;
}
.teacher {
  color: #2b7cff;
}
.child {
  color: #ff7a2b;
}
.speaker-a {
  color: #2b7cff;
}
.speaker-b {
  color: #ff7a2b;
}
button {
  border: none;
  background: #eaeaea;
  border-radius: 8px;
  padding: 6px 10px;
  cursor: pointer;
}
button:hover {
  background: #d6d6d6;
}
.text {
  flex: 1;
}
.scenario {
  margin-top: 28px;
}
.controls {
  margin: 22px 0 8px;
}
label {
  display: block;
  font-weight: bold;
  margin-bottom: 8px;
}
select {
  width: 100%;
  padding: 12px 14px;
  border: 1px solid #d0d0d0;
  border-radius: 10px;
  background: #ffffff;
  font-size: 16px;
}
</style>
</head>
<body>
<div class="container">
<h1>German A1-A2 Conversation Practice</h1>
<p>50 Alltagsszenen mit kurzen einfachen Sätzen und Audio.</p>

<div class="controls">
  <label for="scenario-select">Choose a conversation</label>
  <select id="scenario-select"></select>
</div>

<div id="scenario-root"></div>

<script>
function speak(text) {
  const utterance = new SpeechSynthesisUtterance(text);
  utterance.lang = 'de-DE';
  speechSynthesis.speak(utterance);
}

function buildShopScenario(spec) {
  return {
    title: spec.title,
    lines: [
      ['speaker-a', spec.seller, 'Guten Tag.'],
      ['speaker-b', spec.buyer, 'Guten Tag.'],
      ['speaker-a', spec.seller, 'Was möchten Sie?'],
      ['speaker-b', spec.buyer, `Ich möchte ${spec.item}.`],
      ['speaker-a', spec.seller, 'Sonst noch etwas?'],
      ['speaker-b', spec.buyer, spec.extra],
      ['speaker-a', spec.seller, 'Sehr gut.'],
      ['speaker-b', spec.buyer, 'Wie viel kostet das?'],
      ['speaker-a', spec.seller, `Das kostet ${spec.price}.`],
      ['speaker-b', spec.buyer, 'Kann ich mit Karte zahlen?'],
      ['speaker-a', spec.seller, 'Ja, natürlich.'],
      ['speaker-b', spec.buyer, 'Super.'],
      ['speaker-a', spec.seller, 'Möchten Sie eine Tüte?'],
      ['speaker-b', spec.buyer, spec.bagAnswer],
      ['speaker-a', spec.seller, 'Hier bitte.'],
      ['speaker-b', spec.buyer, 'Danke schön.'],
      ['speaker-a', spec.seller, 'Brauchen Sie den Bon?'],
      ['speaker-b', spec.buyer, 'Nein, danke.'],
      ['speaker-a', spec.seller, 'Auf Wiedersehen.'],
      ['speaker-b', spec.buyer, 'Auf Wiedersehen.']
    ]
  };
}

function buildBookingScenario(spec) {
  return {
    title: spec.title,
    lines: [
      ['speaker-a', spec.clerk, 'Guten Tag.'],
      ['speaker-b', spec.guest, 'Guten Tag.'],
      ['speaker-a', spec.clerk, 'Wie kann ich helfen?'],
      ['speaker-b', spec.guest, `Ich möchte ${spec.booking}.`],
      ['speaker-a', spec.clerk, 'Für wann?'],
      ['speaker-b', spec.guest, `Für ${spec.when}.`],
      ['speaker-a', spec.clerk, 'Für wie viele Personen?'],
      ['speaker-b', spec.guest, `Für ${spec.people}.`],
      ['speaker-a', spec.clerk, 'Wie heißen Sie?'],
      ['speaker-b', spec.guest, `Ich heiße ${spec.name}.`],
      ['speaker-a', spec.clerk, 'Haben Sie eine Telefonnummer?'],
      ['speaker-b', spec.guest, 'Ja, natürlich.'],
      ['speaker-a', spec.clerk, 'Gut. Die Buchung ist fertig.'],
      ['speaker-b', spec.guest, 'Sehr gut.'],
      ['speaker-a', spec.clerk, 'Bitte kommen Sie zehn Minuten früher.'],
      ['speaker-b', spec.guest, 'Ja, das mache ich.'],
      ['speaker-a', spec.clerk, 'Haben Sie noch Fragen?'],
      ['speaker-b', spec.guest, 'Nein, danke.'],
      ['speaker-a', spec.clerk, 'Auf Wiedersehen.'],
      ['speaker-b', spec.guest, 'Auf Wiedersehen.']
    ]
  };
}

function buildDirectionScenario(spec) {
  return {
    title: spec.title,
    lines: [
      ['speaker-a', 'Person A', 'Entschuldigung.'],
      ['speaker-b', 'Person B', 'Ja, bitte.'],
      ['speaker-a', 'Person A', `Ich suche ${spec.place}.`],
      ['speaker-b', 'Person B', 'Gehen Sie geradeaus.'],
      ['speaker-a', 'Person A', 'Ist es weit?'],
      ['speaker-b', 'Person B', 'Nein, nur fünf Minuten.'],
      ['speaker-a', 'Person A', 'Muss ich links gehen?'],
      ['speaker-b', 'Person B', 'Ja, dann links.'],
      ['speaker-a', 'Person A', 'Gibt es ein Schild?'],
      ['speaker-b', 'Person B', 'Ja, ein großes Schild.'],
      ['speaker-a', 'Person A', 'Kann ich auch den Bus nehmen?'],
      ['speaker-b', 'Person B', `Ja, die Linie ${spec.line}.`],
      ['speaker-a', 'Person A', 'Wo ist die Haltestelle?'],
      ['speaker-b', 'Person B', 'Direkt an der Ecke.'],
      ['speaker-a', 'Person A', 'Sehr gut.'],
      ['speaker-b', 'Person B', 'Sie finden es leicht.'],
      ['speaker-a', 'Person A', 'Danke für die Hilfe.'],
      ['speaker-b', 'Person B', 'Gern geschehen.'],
      ['speaker-a', 'Person A', 'Schönen Tag noch.'],
      ['speaker-b', 'Person B', 'Ihnen auch.']
    ]
  };
}

function buildHomeScenario(spec) {
  return {
    title: spec.title,
    lines: [
      ['speaker-a', spec.personA, 'Hallo.'],
      ['speaker-b', spec.personB, 'Hallo.'],
      ['speaker-a', spec.personA, 'Haben Sie einen Moment?'],
      ['speaker-b', spec.personB, 'Ja, natürlich.'],
      ['speaker-a', spec.personA, `Ich habe eine Frage zu ${spec.topic}.`],
      ['speaker-b', spec.personB, 'Ja, was ist los?'],
      ['speaker-a', spec.personA, spec.problem],
      ['speaker-b', spec.personB, 'Ich verstehe.'],
      ['speaker-a', spec.personA, 'Können Sie mir helfen?'],
      ['speaker-b', spec.personB, 'Ja, gern.'],
      ['speaker-a', spec.personA, 'Wann haben Sie Zeit?'],
      ['speaker-b', spec.personB, 'Heute am Abend.'],
      ['speaker-a', spec.personA, 'Das passt gut.'],
      ['speaker-b', spec.personB, spec.request],
      ['speaker-a', spec.personA, 'Ja, mache ich.'],
      ['speaker-b', spec.personB, 'Dann sehen wir uns später.'],
      ['speaker-a', spec.personA, 'Vielen Dank.'],
      ['speaker-b', spec.personB, 'Kein Problem.'],
      ['speaker-a', spec.personA, 'Bis später.'],
      ['speaker-b', spec.personB, 'Bis später.']
    ]
  };
}

function buildWorkScenario(spec) {
  return {
    title: spec.title,
    lines: [
      ['speaker-a', spec.personA, 'Guten Morgen.'],
      ['speaker-b', spec.personB, 'Guten Morgen.'],
      ['speaker-a', spec.personA, `Ich brauche Hilfe mit ${spec.task}.`],
      ['speaker-b', spec.personB, 'Ja, gern.'],
      ['speaker-a', spec.personA, 'Haben Sie jetzt Zeit?'],
      ['speaker-b', spec.personB, 'Ja, fünf Minuten.'],
      ['speaker-a', spec.personA, 'Sehr gut.'],
      ['speaker-b', spec.personB, 'Was ist das Problem?'],
      ['speaker-a', spec.personA, spec.problem],
      ['speaker-b', spec.personB, 'Ich sehe.'],
      ['speaker-a', spec.personA, 'Können wir das heute machen?'],
      ['speaker-b', spec.personB, 'Ja, heute am Vormittag.'],
      ['speaker-a', spec.personA, 'Perfekt.'],
      ['speaker-b', spec.personB, 'Bitte schicken Sie mir eine E-Mail.'],
      ['speaker-a', spec.personA, 'Ja, mache ich.'],
      ['speaker-b', spec.personB, 'Dann komme ich später vorbei.'],
      ['speaker-a', spec.personA, 'Vielen Dank.'],
      ['speaker-b', spec.personB, 'Gern.'],
      ['speaker-a', spec.personA, 'Bis später.'],
      ['speaker-b', spec.personB, 'Bis später.']
    ]
  };
}

function buildLeisureScenario(spec) {
  return {
    title: spec.title,
    lines: [
      ['speaker-a', spec.staff, 'Guten Tag.'],
      ['speaker-b', spec.visitor, 'Guten Tag.'],
      ['speaker-a', spec.staff, `Möchten Sie heute ${spec.activity}?`],
      ['speaker-b', spec.visitor, 'Ja, gern.'],
      ['speaker-a', spec.staff, 'Haben Sie schon ein Ticket?'],
      ['speaker-b', spec.visitor, 'Nein, noch nicht.'],
      ['speaker-a', spec.staff, `Ein Ticket kostet ${spec.price}.`],
      ['speaker-b', spec.visitor, 'Gut.'],
      ['speaker-a', spec.staff, `Möchten Sie auch ${spec.extra}?`],
      ['speaker-b', spec.visitor, 'Nein, danke.'],
      ['speaker-a', spec.staff, 'Dann brauche ich Ihren Namen.'],
      ['speaker-b', spec.visitor, `Ich heiße ${spec.name}.`],
      ['speaker-a', spec.staff, 'Sehr gut.'],
      ['speaker-b', spec.visitor, 'Wo ist der Eingang?'],
      ['speaker-a', spec.staff, 'Direkt rechts.'],
      ['speaker-b', spec.visitor, 'Wann beginnt es?'],
      ['speaker-a', spec.staff, `Um ${spec.time}.`],
      ['speaker-b', spec.visitor, 'Danke schön.'],
      ['speaker-a', spec.staff, 'Viel Spaß.'],
      ['speaker-b', spec.visitor, 'Danke.']
    ]
  };
}

function buildTravelScenario(spec) {
  return {
    title: spec.title,
    lines: [
      ['speaker-a', spec.staff, 'Guten Tag.'],
      ['speaker-b', spec.traveler, 'Guten Tag.'],
      ['speaker-a', spec.staff, 'Wohin möchten Sie?'],
      ['speaker-b', spec.traveler, `Nach ${spec.destination}.`],
      ['speaker-a', spec.staff, 'Für wann brauchen Sie es?'],
      ['speaker-b', spec.traveler, `Für ${spec.time}.`],
      ['speaker-a', spec.staff, 'Eine Person?'],
      ['speaker-b', spec.traveler, 'Ja, eine Person.'],
      ['speaker-a', spec.staff, `Das kostet ${spec.price}.`],
      ['speaker-b', spec.traveler, 'Gut.'],
      ['speaker-a', spec.staff, 'Möchten Sie noch etwas?'],
      ['speaker-b', spec.traveler, 'Nein, danke.'],
      ['speaker-a', spec.staff, spec.documentLine],
      ['speaker-b', spec.traveler, 'Vielen Dank.'],
      ['speaker-a', spec.staff, spec.handoverLine],
      ['speaker-b', spec.traveler, 'Sehr gut.'],
      ['speaker-a', spec.staff, 'Haben Sie noch Fragen?'],
      ['speaker-b', spec.traveler, 'Nein, danke.'],
      ['speaker-a', spec.staff, 'Gute Reise.'],
      ['speaker-b', spec.traveler, 'Danke schön.']
    ]
  };
}

function buildHealthScenario(spec) {
  return {
    title: spec.title,
    lines: [
      ['speaker-a', spec.staff, 'Guten Tag.'],
      ['speaker-b', spec.patient, 'Guten Tag.'],
      ['speaker-a', spec.staff, 'Wie kann ich helfen?'],
      ['speaker-b', spec.patient, spec.problem],
      ['speaker-a', spec.staff, 'Seit wann?'],
      ['speaker-b', spec.patient, `Seit ${spec.since}.`],
      ['speaker-a', spec.staff, 'Haben Sie Schmerzen?'],
      ['speaker-b', spec.patient, 'Ja, ein bisschen.'],
      ['speaker-a', spec.staff, 'Haben Sie einen Termin?'],
      ['speaker-b', spec.patient, spec.appointment],
      ['speaker-a', spec.staff, 'Bitte warten Sie kurz.'],
      ['speaker-b', spec.patient, 'Ja, natürlich.'],
      ['speaker-a', spec.staff, spec.waitLine],
      ['speaker-b', spec.patient, 'Danke.'],
      ['speaker-a', spec.staff, 'Brauchen Sie noch etwas?'],
      ['speaker-b', spec.patient, 'Nein, danke.'],
      ['speaker-a', spec.staff, 'Bitte setzen Sie sich.'],
      ['speaker-b', spec.patient, 'Gern.'],
      ['speaker-a', spec.staff, 'Gute Besserung.'],
      ['speaker-b', spec.patient, 'Vielen Dank.']
    ]
  };
}

function buildSchoolScenario(spec) {
  return {
    title: spec.title,
    lines: [
      ['speaker-a', spec.staff, 'Guten Tag.'],
      ['speaker-b', spec.student, 'Guten Tag.'],
      ['speaker-a', spec.staff, 'Was brauchen Sie?'],
      ['speaker-b', spec.student, `Ich brauche Hilfe mit ${spec.topic}.`],
      ['speaker-a', spec.staff, 'Kein Problem.'],
      ['speaker-b', spec.student, 'Danke.'],
      ['speaker-a', spec.staff, `Haben Sie schon ${spec.document}?`],
      ['speaker-b', spec.student, spec.documentAnswer],
      ['speaker-a', spec.staff, 'Dann füllen Sie bitte dieses Formular aus.'],
      ['speaker-b', spec.student, 'Ja, mache ich.'],
      ['speaker-a', spec.staff, 'Wann brauchen Sie es?'],
      ['speaker-b', spec.student, `Bis ${spec.when}.`],
      ['speaker-a', spec.staff, 'Das geht.'],
      ['speaker-b', spec.student, 'Sehr gut.'],
      ['speaker-a', spec.staff, 'Kommen Sie morgen noch einmal.'],
      ['speaker-b', spec.student, 'Ja, gern.'],
      ['speaker-a', spec.staff, 'Haben Sie noch Fragen?'],
      ['speaker-b', spec.student, 'Nein, danke.'],
      ['speaker-a', spec.staff, 'Auf Wiedersehen.'],
      ['speaker-b', spec.student, 'Auf Wiedersehen.']
    ]
  };
}

function buildExtraScenarios() {
  return [
    {
      title: 'Morning routine before school',
      lines: [
        ['speaker-a', 'Mutter', 'Guten Morgen, Lina.'],
        ['speaker-b', 'Lina', 'Guten Morgen, Mama.'],
        ['speaker-a', 'Mutter', 'Wie spät ist es?'],
        ['speaker-b', 'Lina', 'Es ist halb sieben.'],
        ['speaker-a', 'Mutter', 'Steh bitte auf.'],
        ['speaker-b', 'Lina', 'Ich bin noch müde.'],
        ['speaker-a', 'Mutter', 'Heute hast du Mathe.'],
        ['speaker-b', 'Lina', 'Stimmt, und auch Musik.'],
        ['speaker-a', 'Mutter', 'Geh zuerst ins Bad.'],
        ['speaker-b', 'Lina', 'Ich putze gleich meine Zähne.'],
        ['speaker-a', 'Mutter', 'Vergiss dein Gesicht nicht zu waschen.'],
        ['speaker-b', 'Lina', 'Ja, mache ich.'],
        ['speaker-a', 'Mutter', 'Danach zieh dich an.'],
        ['speaker-b', 'Lina', 'Ich nehme heute den roten Pullover.'],
        ['speaker-a', 'Mutter', 'Der passt gut zur Jeans.'],
        ['speaker-b', 'Lina', 'Wo sind meine Socken?'],

        ['speaker-b', 'Lina', 'Danke, ich habe sie.'],

        ['speaker-b', 'Lina', 'Ich komme sofort in die Küche.']

    },
    {

    {

function createScenario(title, lines) {
  const section = document.createElement('section');
  section.className = 'scenario';

  const heading = document.createElement('h2');
  heading.textContent = title;
  section.appendChild(heading);

  const list = document.createElement('ul');

  lines.forEach(([speakerClass, speakerLabel, text]) => {
    const item = document.createElement('li');

    const textWrapper = document.createElement('div');
    textWrapper.className = 'text';

    const speaker = document.createElement('span');
    speaker.className = `speaker ${speakerClass}`;
    speaker.textContent = `${speakerLabel}:`;

    textWrapper.appendChild(speaker);
    textWrapper.append(` ${text}`);

    const button = document.createElement('button');
    button.type = 'button';
    button.textContent = '▶️';
    button.addEventListener('click', () => speak(text));

    item.appendChild(textWrapper);
    item.appendChild(button);
    list.appendChild(item);
  });

  section.appendChild(list);
  return section;
}

document.addEventListener('DOMContentLoaded', () => {
  const select = document.getElementById('scenario-select');
  const root = document.getElementById('scenario-root');

  scenarios.forEach((scenario, index) => {
    const option = document.createElement('option');
    option.value = String(index);
    option.textContent = scenario.title;
    select.appendChild(option);
  });

  function renderScenario(index) {
    root.innerHTML = '';
    root.appendChild(createScenario(scenarios[index].title, scenarios[index].lines));
  }

  select.addEventListener('change', (event) => {
    renderScenario(Number(event.target.value));
  });

  select.value = '0';
  renderScenario(0);
});
