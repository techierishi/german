function createScenario(title, lines) {
  const section = document.createElement('section');
  section.className = 'scenario';

  const heading = document.createElement('h2');
  heading.textContent = title;
  section.appendChild(heading);

  const list = document.createElement('ul');

  lines.forEach(([speakerClass, speakerLabel, text]) => {
    const item = document.createElement('li');

    const textWrapper = document.createElement('div');
    textWrapper.className = 'text';

    const speaker = document.createElement('span');
    speaker.className = `speaker ${speakerClass}`;
    speaker.textContent = `${speakerLabel}:`;

    textWrapper.appendChild(speaker);
    textWrapper.append(` ${text}`);

    const button = document.createElement('button');
    button.type = 'button';
    button.textContent = '▶️';
    button.addEventListener('click', () => speak(text));

    item.appendChild(textWrapper);
    item.appendChild(button);
    list.appendChild(item);
  });

  section.appendChild(list);
  return section;
}

document.addEventListener('DOMContentLoaded', () => {
  const select = document.getElementById('scenario-select');
  const root = document.getElementById('scenario-root');

  scenarios.forEach((scenario, index) => {
    const option = document.createElement('option');
    option.value = String(index);
    option.textContent = scenario.title;
    select.appendChild(option);
  });

  function renderScenario(index) {
    root.innerHTML = '';
    root.appendChild(createScenario(scenarios[index].title, scenarios[index].lines));
  }

  select.addEventListener('change', (event) => {
    renderScenario(Number(event.target.value));
  });

  select.value = '0';
  renderScenario(0);
});
